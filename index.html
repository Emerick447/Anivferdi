<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ferdinand 13</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial;
    overflow:hidden;
}
#loading{
    position:fixed;
    inset:0;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#111;
}
#bar{
    width:60%;
    height:28px;
    border:3px solid #888;
}
#fill{
    height:100%;
    width:0;
    background:#39d353;
}
#menu{
    display:block;
    text-align:center;
    padding-top:10vh;
}
button{
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#39d353;
    color:white;
    transition:.2s;
}
button:hover{
    transform:scale(1.05);
}
canvas{
    position:fixed;
    inset:0;
    z-index:-1;
}
</style>

</head>
<body>

<canvas id="c"></canvas>

<div id="loading">
    <h1>Connexion au serveur…</h1>

    <div id="bar">
        <div id="fill"></div>
    </div>

    <p id="txt">0%</p>
</div>

<div id="menu">

    <h1>🎉 Joyeux anniversaire Ferdinand !</h1>
    <h2>Niveau 13 débloqué</h2>

    <button onclick="startLoading()">
        🌐 Rejoindre le serveur
    </button>

    <br><br>

    <button onclick="window.open('https://github.com/Emerick447/tim-eme/tree/91868f421e0940b030203901c9f75dac85486f4d/APPS/EXE','_blank')">
        📥 Télécharger Minecraft presque jouable
    </button>

</div>

<script>
const msgs=[
    'Initialisation...',
    'Connexion au serveur...',
    'Chargement des chunks...',
    'Préparation du monde...',
    'Téléportation...'
];

const f=document.getElementById("fill");
const t=document.getElementById("txt");
const loading=document.getElementById("loading");
const menu=document.getElementById("menu");

function startLoading(){

    menu.style.display="none";
    loading.style.display="flex";

    let p=0;

    f.style.width="0%";
    t.textContent="0%";

    let i=setInterval(()=>{

        p++;

        f.style.width=p+"%";
        t.textContent=msgs[Math.min(4,Math.floor(p/20))]+" "+p+"%";

        if(p>=100){

            clearInterval(i);

            location.href="game.html";

        }

    },40);

}

// Fond animé
const cv=document.getElementById('c');
const x=cv.getContext('2d');

function rs(){
    cv.width=innerWidth;
    cv.height=innerHeight;
}
rs();
onresize=rs;

let pts=[...Array(100)].map(()=>({
    x:Math.random()*cv.width,
    y:Math.random()*cv.height,
    vx:(Math.random()-.5),
    vy:(Math.random()-.5)
}));

(function anim(){

    x.fillStyle="#0b2a12";
    x.fillRect(0,0,cv.width,cv.height);

    x.fillStyle="#39d353";

    pts.forEach(p=>{

        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>cv.width)p.vx*=-1;
        if(p.y<0||p.y>cv.height)p.vy*=-1;

        x.fillRect(p.x,p.y,3,3);

    });

    requestAnimationFrame(anim);

})();
</script>

</body>
</html>
