<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ferdinand 13 🎉</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    overflow:hidden;
    font-family:'Press Start 2P';
    background:#000;
    color:white;
}

/* 🎇 Canvas particles */
canvas {
    position:fixed;
    top:0; left:0;
    z-index:0;
}

/* 🧊 UI */
.box {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    padding:25px;
    border:4px solid #00ff88;
    background:rgba(18,59,30,0.9);
    z-index:10;

    animation: appear 1.2s ease-out;
}

@keyframes appear {
    from { transform:translate(-50%,-50%) scale(0.5); opacity:0; }
    to { transform:translate(-50%,-50%) scale(1); opacity:1; }
}

/* 🎮 Title pulse */
h1 {
    color:#00ff88;
    animation: pulse 1.5s infinite;
    text-shadow:0 0 10px black;
}

@keyframes pulse {
    0% { transform:scale(1); text-shadow:0 0 5px #00ff88; }
    50% { transform:scale(1.05); text-shadow:0 0 20px #00ff88; }
    100% { transform:scale(1); text-shadow:0 0 5px #00ff88; }
}

/* 🎁 Button glow */
button {
    font-family:inherit;
    padding:12px;
    margin-top:15px;
    background:#2ecc71;
    border:3px solid #145a32;
    cursor:pointer;

    animation: glow 2s infinite;
}

button:hover {
    background:#27ae60;
}

@keyframes glow {
    0% { box-shadow:0 0 5px #00ff88; }
    50% { box-shadow:0 0 25px #00ff88; }
    100% { box-shadow:0 0 5px #00ff88; }
}

/* 🎉 confetti */
.confetti {
    position:fixed;
    width:6px;
    height:6px;
    background:red;
    z-index:5;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform:translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">
    <h1>🎉 FERDINAND 13 🎉</h1>
    <p>Serveur Minecraft privé débloqué</p>

    <button onclick="openGame()">🌐 Rejoindre le serveur</button>
</div>

<script>
// =========================
// PAGE TRANSITION
// =========================
function openGame(){
    document.body.style.transition="1s";
    document.body.style.opacity="0";
    setTimeout(()=>{
        window.location.href="game.html";
    },800);
}

// =========================
// PARTICLES BACKGROUND
// =========================
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*3+1,
        dx:(Math.random()-0.5)*1,
        dy:(Math.random()-0.5)*1
    });
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.4)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let p of particles){
        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;

        ctx.fillStyle="#00ff88";
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
    }

    requestAnimationFrame(animate);
}
animate();

// =========================
// CONFETTI LOOP
// =========================
function spawnConfetti(){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*innerWidth+"px";
    c.style.background=["#ff0","#f00","#0f0","#0ff","#fff"][Math.floor(Math.random()*5)];
    c.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(c);

    setTimeout(()=>c.remove(),4000);
}

setInterval(spawnConfetti,120);

// resize
window.addEventListener("resize",()=>{
    canvas.width=innerWidth;
    canvas.height=innerHeight;
});
</script>

</body>
</html>
