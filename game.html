<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Minecraft Ferdinand Server</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body { margin:0; overflow:hidden; font-family:'Press Start 2P'; }
#hud {
    position:absolute;
    top:10px; left:10px;
    z-index:10;
    color:white;
    font-size:10px;
}
#crosshair {
    position:absolute;
    top:50%; left:50%;
    width:10px; height:10px;
    transform:translate(-50%,-50%);
    border:2px solid white;
    z-index:5;
}
button {
    font-family:inherit;
    padding:8px;
    background:#2ecc71;
    border:3px solid #145a32;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="hud">
    🎮 FERDINAND SERVER 13<br>
    <button onclick="spawnXP()">💰 XP</button>
    <button onclick="resetCam()">🏠 Spawn</button>
</div>

<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,10,10);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// =====================
// TERRAIN
// =====================
for(let x=-10;x<=10;x++){
    for(let z=-10;z<=10;z++){
        let h = Math.floor(Math.random()*3);

        for(let y=0;y<h;y++){
            let color = (y==h-1) ? 0x2ecc71 : 0x8b5a2b;

            const geo = new THREE.BoxGeometry();
            const mat = new THREE.MeshBasicMaterial({color});
            const b = new THREE.Mesh(geo,mat);

            b.position.set(x,y,z);
            scene.add(b);
        }
    }
}

// =====================
// XP ORBS
// =====================
let orbs=[];

function spawnXP(){
    for(let i=0;i<10;i++){
        const geo=new THREE.SphereGeometry(0.3);
        const mat=new THREE.MeshBasicMaterial({color:0xffff00});
        const o=new THREE.Mesh(geo,mat);

        o.position.set(
            (Math.random()-0.5)*20,
            2,
            (Math.random()-0.5)*20
        );

        scene.add(o);
        orbs.push(o);
    }
}

// =====================
// CAMERA RESET
// =====================
function resetCam(){
    camera.position.set(0,10,10);
}

// =====================
// CONTROLS
// =====================
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// =====================
// LOOP
// =====================
function animate(){
    requestAnimationFrame(animate);

    if(keys["w"]) camera.position.z -= 0.2;
    if(keys["s"]) camera.position.z += 0.2;
    if(keys["a"]) camera.position.x -= 0.2;
    if(keys["d"]) camera.position.x += 0.2;

    // collect XP
    orbs.forEach((o,i)=>{
        let dx=o.position.x-camera.position.x;
        let dz=o.position.z-camera.position.z;

        if(Math.sqrt(dx*dx+dz*dz)<1.5){
            scene.remove(o);
            orbs.splice(i,1);
        }
    });

    renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
