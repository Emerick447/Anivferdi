<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini Minecraft</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: sans-serif;
    background: #000;
  }

  canvas {
    display: block;
    margin: auto;
    background: #87CEEB;
  }

  #info {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.5);
    color: white;
    padding: 8px;
    border-radius: 8px;
    display: none;
  }

  
  #barContainer {
    width: 300px;
    height: 20px;
    border: 2px solid white;
    margin-top: 20px;
  }

  #bar {
    width: 0%;
    height: 100%;
    background: limegreen;
    transition: width 0.2s;
  }

  #title {
    font-size: 28px;
  }
</style>
</head>

<body>


<div id="info">
  ZQSD / flèches = bouger<br>
  Clic gauche = casser<br>
  Clic droit = poser bloc
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const tileSize = 40;
const cols = Math.ceil(canvas.width / tileSize);
const rows = Math.ceil(canvas.height / tileSize);

let world = [];

for (let y = 0; y < rows; y++) {
  world[y] = [];
  for (let x = 0; x < cols; x++) {
    world[y][x] = (y > rows / 2) ? 1 : 0;
  }
}

let player = {
  x: 5,
  y: Math.floor(rows / 2) - 1,
  color: "red"
};

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function update() {
  if (keys["z"] || keys["ArrowUp"]) player.y--;
  if (keys["s"] || keys["ArrowDown"]) player.y++;
  if (keys["q"] || keys["ArrowLeft"]) player.x--;
  if (keys["d"] || keys["ArrowRight"]) player.x++;

  player.x = Math.max(0, Math.min(cols - 1, player.x));
  player.y = Math.max(0, Math.min(rows - 1, player.y));
}

canvas.addEventListener("click", e => {
  const x = Math.floor(e.clientX / tileSize);
  const y = Math.floor(e.clientY / tileSize);
  if (world[y]) world[y][x] = 0;
});

canvas.addEventListener("contextmenu", e => {
  e.preventDefault();
  const x = Math.floor(e.clientX / tileSize);
  const y = Math.floor(e.clientY / tileSize);
  if (world[y]) world[y][x] = 1;
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (world[y][x] === 1) {
        ctx.fillStyle = "#8B4513";
        ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
      }
    }
  }

  ctx.fillStyle = player.color;
  ctx.fillRect(player.x * tileSize, player.y * tileSize, tileSize, tileSize);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

</script>

</body>
</html>
